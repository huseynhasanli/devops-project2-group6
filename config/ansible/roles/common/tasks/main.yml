- name: Update apt cache and upgrade packages
  ansible.builtin.apt:
    update_cache: yes
    upgrade: safe
    cache_valid_time: 3600

- name: Install common utilities
  ansible.builtin.apt:
    name: [curl, unzip, git, jq, fail2ban, ufw]
    state: present

- name: Allow SSH
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Enable UFW
  community.general.ufw:
    state: enabled
    policy: deny
