name: Backend CI/CD

"on":
  push:
    branches:
      - main
    paths:
      - .github/workflows/backend.yml
      - backend/**
  pull_request:
    paths:
      - .github/workflows/backend.yml
      - backend/**

permissions:
  contents: read

jobs:
  build-test-scan:
    runs-on:
      - self-hosted
      - ops-runner
      - azure-private
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Build and test backend
        run: mvn verify -B

      - name: Run SonarQube scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn sonar:sonar -B \
            -Dsonar.projectKey=backend \
            -Dsonar.host.url="$SONAR_HOST_URL" \
            -Dsonar.login="$SONAR_TOKEN"

      - name: Log in to Azure with the ops runner managed identity
        if: github.ref == 'refs/heads/main'
        working-directory: .
        run: az login --identity

      - name: Initialize Terraform to read shared outputs
        if: github.ref == 'refs/heads/main'
        working-directory: .
        run: terraform -chdir=infra/terraform init -input=false

      - name: Load ACR details from Terraform outputs
        if: github.ref == 'refs/heads/main'
        working-directory: .
        run: |
          echo "ACR_NAME=$(terraform -chdir=infra/terraform output -raw acr_name)" >> "$GITHUB_ENV"
          echo "ACR_REGISTRY=$(terraform -chdir=infra/terraform output -raw acr_login_server)" >> "$GITHUB_ENV"

      - name: Build and push backend image to ACR
        if: github.ref == 'refs/heads/main'
        working-directory: .
        env:
          IMAGE_NAME: backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          az acr login --name "$ACR_NAME"
          docker build -f backend/Dockerfile -t "$ACR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG" backend
          docker push "$ACR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG"
          docker tag "$ACR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG" "$ACR_REGISTRY/$IMAGE_NAME:latest"
          docker push "$ACR_REGISTRY/$IMAGE_NAME:latest"

  deploy:
    needs: build-test-scan
    if: github.ref == 'refs/heads/main'
    runs-on:
      - self-hosted
      - ops-runner
      - azure-private
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to Azure with the ops runner managed identity
        run: az login --identity

      - name: Initialize Terraform for Ansible inventory generation
        run: terraform -chdir=infra/terraform init -input=false

      - name: Install required Ansible collections
        run: ansible-galaxy collection install -r config/ansible/requirements.yml

      - name: Deploy backend via Ansible
        env:
          IMAGE_TAG: ${{ github.sha }}
          BACKEND_CORS_ALLOWED_ORIGINS: ${{ vars.BACKEND_CORS_ALLOWED_ORIGINS }}
        run: ansible-playbook config/ansible/site.yml --limit backend_vms
